name: Deploy Game (Self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-game-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
      - name: Deploy production
        env:
          APP_ROOT: /var/www/game
          PM2_HOME: /var/www/.pm2
        run: scripts/deploy-production.sh
